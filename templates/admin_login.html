<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CALCULAIRE Elite Control Access</title>
  <style>
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at 80% 10%, #2b2110 0, transparent 32%), #050505; color: #fff; font-family: Inter, system-ui, sans-serif; }
    a { position: fixed; top: 24px; left: 24px; color: #e0bd72; }
    main { width: min(420px, 100%); padding: 42px; border: 1px solid #5f4a25; border-radius: 18px; background: rgba(16, 16, 16, .92); box-shadow: 0 30px 100px #000; }
    h1 { margin: 0; color: #e0bd72; font-family: Georgia, serif; font-size: 2.35rem; }
    p { color: #999; line-height: 1.6; }
    form { display: grid; gap: 14px; margin-top: 28px; }
    label { display: grid; gap: 7px; color: #bbb; font-size: .88rem; }
    input, button { min-height: 48px; border-radius: 9px; font: inherit; }
    input { border: 1px solid #333; padding: 0 13px; background: #0b0b0b; color: #fff; }
    input:focus { outline: 2px solid #e0bd72; outline-offset: 2px; }
    button { border: 0; background: #d2aa5d; color: #111; font-weight: 800; cursor: pointer; }
    .error { color: #ff8894; }
  </style>
</head>
<body>
  <a href="/">Back to CALCULAIRE</a>
  <main>
    <h1>CALCULAIRE&trade;</h1>
    <p>Restricted control center. Administrator credentials are separate from customer accounts.</p>
    {% if error %}<p class="error" role="alert">{{ error }}</p>{% endif %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <label>Username<input type="text" name="username" autocomplete="username" required autofocus /></label>
      <label>Password<input type="password" name="password" autocomplete="current-password" required /></label>
      <button type="submit">Enter Control Center</button>
    </form>
  </main>
</body>
</html>
